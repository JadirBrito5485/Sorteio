<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORTEIO VIP - RIO NEGRINHO SHOP</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 50px; }
        header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        img.prod-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        
        /* Formulário */
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #f9e29c); color: #000; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* Lista de Participantes */
        .lista-section { margin-top: 30px; background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; }
        .lista-header { color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; display: flex; justify-content: space-between; }
        .scroll-lista { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .scroll-lista::-webkit-scrollbar { width: 5px; }
        .scroll-lista::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .user-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 13px; align-items: center; }
        .user-row:last-child { border: none; }
        .badge-real { background: #25d366; color: #000; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; }
        .badge-fake { color: #555; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header><div style="font-weight:900; color:var(--gold);">RIO NEGRINHO SHOP</div></header>

<div class="container">
    <div class="card">
        <img src="https://down-br.img.susercontent.com/file/br-11134207-7r98o-loh4miq61d8n7a.webp" class="prod-img">
        <h2 style="text-align:center; margin:0 0 15px; font-weight:900;">SORTEIO FONE M10</h2>
        
        <div id="cadastroArea">
            <input type="text" id="nome" placeholder="Nome Completo">
            <input type="tel" id="cpf" placeholder="Seu CPF" maxlength="11">
            <input type="tel" id="whats" placeholder="WhatsApp (DDD)">
            <button class="btn-gold" onclick="registrar()">PARTICIPAR AGORA</button>
        </div>

        <div id="linkArea" style="display:none; text-align:center;">
            <p style="color:var(--gold); font-weight:bold;">LINK GERADO! 🚀</p>
            <input type="text" id="inputLink" readonly style="background:#fff; color:#000;">
            <p style="font-size:11px; color:#aaa;">Envie para 1 amigo para ativar sua vaga na lista!</p>
        </div>
    </div>

    <div class="lista-section">
        <div class="lista-header">
            <span>Participantes</span>
            <span id="contadorTotal" style="color:#fff;">0</span>
        </div>
        <div class="scroll-lista" id="listaFinal">
            </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDLHZwaj72-i3M6BgrEmaT9ev2t6rGjJwU",
        authDomain: "app-web-bbd49.firebaseapp.com",
        projectId: "app-web-bbd49",
        storageBucket: "app-web-bbd49.firebasestorage.app",
        messagingSenderId: "881365161427",
        appId: "1:881365161427:web:1755ce21c9c231f10d4b26"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. GERADOR DE FILA FAKE (200 pessoas)
    const nomesFake = ["Ricardo Silva", "Ana Paula", "Marcos Oliveira", "Juliana Costa", "Thiago Souza", "Patrícia Lima", "Fernando Santos", "Camila Rocha", "Bruno Alves", "Larissa Ferreira", "Rafael Mendes", "Amanda Borges", "Diego Castro", "Bianca Nunes", "Rodrigo Pires", "Vanessa Guedes"];
    const sobrenomesFake = ["Mendes", "Pacheco", "Brito", "Schroeder", "Zimmermann", "Tavares", "Farias", "Duarte", "Gomes", "Almeida", "Lopes", "Cordeiro"];

    function gerarFilaFake() {
        let fila = [];
        for (let i = 0; i < 200; i++) {
            let n = nomesFake[Math.floor(Math.random() * nomesFake.length)];
            let s = sobrenomesFake[Math.floor(Math.random() * sobrenomesFake.length)];
            fila.push({ nome: n + " " + s, real: false });
        }
        return fila;
    }

    const filaFake = gerarFilaFake();

    // 2. BUSCAR REAIS E MOSTRAR TUDO
    db.collection("participantes").where("vagaAtiva", "==", true).onSnapshot((snapshot) => {
        const listaDiv = document.getElementById('listaFinal');
        listaDiv.innerHTML = "";
        let reais = [];
        
        snapshot.forEach(doc => { reais.push({ nome: doc.data().nome, real: true }); });

        // Junta reais (topo) com fakes
        const listaCompleta = [...reais, ...filaFake];
        document.getElementById('contadorTotal').innerText = listaCompleta.length;

        listaCompleta.forEach(p => {
            listaDiv.innerHTML += `
                <div class="user-row">
                    <span>👤 ${p.nome} ${p.real ? '<span class="badge-real">VERIFICADO</span>' : ''}</span>
                    <span class="badge-fake">${p.real ? 'ATIVO' : 'AGUARDANDO'}</span>
                </div>`;
        });
    });

    async function registrar() {
        const nome = document.getElementById('nome').value;
        const cpf = document.getElementById('cpf').value;
        const whats = document.getElementById('whats').value;
        if(!nome || !cpf) return alert("Preencha os campos!");

        try {
            await db.collection("participantes").doc(cpf).set({
                nome: nome, whats: whats, vagaAtiva: false, data: firebase.firestore.FieldValue.serverTimestamp()
            });
            const link = window.location.href.split('?')[0] + "?ref=" + cpf;
            document.getElementById('inputLink').value = link;
            document.getElementById('cadastroArea').style.display = 'none';
            document.getElementById('linkArea').style.display = 'block';
        } catch (e) { alert("Erro ao cadastrar."); }
    }
</script>
</body>
</html>
